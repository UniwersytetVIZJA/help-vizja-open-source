doctrine:
    dbal:
        url: '%env(resolve:DATABASE_URL)%'
        charset: utf8mb4
        default_table_options:
            charset: utf8mb4
            collate: utf8mb4_0900_ai_ci
        options:
            1002: "SET NAMES utf8mb4 COLLATE utf8mb4_0900_ai_ci"
        profiling_collect_backtrace: '%kernel.debug%'
        use_savepoints: true
        types:
            phone_number: Misd\PhoneNumberBundle\Doctrine\DBAL\Types\PhoneNumberType

    orm:
        auto_generate_proxy_classes: true
        auto_mapping: true
        controller_resolver:
            auto_mapping: false
        enable_lazy_ghost_objects: true
        enable_native_lazy_objects: true
        dql:
            string_functions:
                CAST: DoctrineExtensions\Query\Mysql\Cast
                DATE: DoctrineExtensions\Query\Mysql\Date
                DATETIME: DoctrineExtensions\Query\Mysql\DateTime
                DATEDIFF: DoctrineExtensions\Query\Mysql\DateDiff
                DATEFORMAT: DoctrineExtensions\Query\Mysql\DateFormat
                IF: DoctrineExtensions\Query\Mysql\IfElse
                IFNULL: DoctrineExtensions\Query\Mysql\IfNull
        mappings:
            App:
                alias: App
                dir: '%kernel.project_dir%/src/Database/Entity'
                is_bundle: false
                prefix: 'App\Database\Entity'
                type: attribute
        naming_strategy: doctrine.orm.naming_strategy.underscore_number_aware
        report_fields_where_declared: true
        validate_xml_mapping: false

when@test:
    doctrine:
        dbal:
            dbname_suffix: ''

when@prod:
    doctrine:
        orm:
            auto_generate_proxy_classes: false
            proxy_dir: '%kernel.build_dir%/doctrine/orm/Proxies'
            query_cache_driver:
                type: pool
                pool: doctrine.system_cache_pool
            result_cache_driver:
                type: pool
                pool: doctrine.result_cache_pool

    framework:
        cache:
            pools:
                doctrine.result_cache_pool:
                    adapter: cache.app
                doctrine.system_cache_pool:
                    adapter: cache.system
