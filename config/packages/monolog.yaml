monolog:
    channels:
        - deprecation

when@dev:
    monolog:
        handlers:
            main:
                type: fingers_crossed
                action_level: error
                handler: grouped
                excluded_http_codes: [404, 405]

            grouped:
                type: group
                members: [nested, database]

            nested:
                type: stream
                path: "%kernel.logs_dir%/dev.log"
                level: debug
                channels: ["!event"]

            database:
                type: service
                id: App\Logi\DatabaseLogHandler
                level: error

            console:
                type: console
                process_psr_3_messages: false
                channels: ["!event", "!doctrine", "!console"]

            deprecation:
                type: stream
                channels: [deprecation]
                path: "%kernel.logs_dir%/deprecations_dev.log"


when@test:
    monolog:
        handlers:
            main:
                type: fingers_crossed
                action_level: error
                handler: nested
                excluded_http_codes: [404, 405]

            nested:
                type: stream
                path: "%kernel.logs_dir%/test.log"
                level: debug


when@prod:
    monolog:
        handlers:
            main:
                type: fingers_crossed
                action_level: error
                handler: grouped
                excluded_http_codes: [404, 405]
                buffer_size: 50

            grouped:
                type: group
                members: [nested, database]

            nested:
                type: stream
                path: "%kernel.logs_dir%/prod.log"
                level: debug

            database:
                type: service
                id: App\Logi\DatabaseLogHandler
                level: error

            console:
                type: console
                process_psr_3_messages: false
                channels: ["!event", "!doctrine"]

            deprecation:
                type: stream
                channels: [deprecation]
                path: "%kernel.logs_dir%/deprecations.log"
